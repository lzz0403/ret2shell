[package]
name = "r2s-queue"
version = "3.3.1"
edition = "2021"
rust-version = "1.80.0"
description = "Message queue for Ret2Shell - A feature-riches CTF challenge platform."
authors = ["Reverier-Xu <reverier.xu@woooo.tech>"]
publish = false
homepage = "https://ret.sh.cn/"
keywords = ["ctf", "challenge", "platform", "security", "education"]
resolver = "2"

[dependencies]
async-nats = "0.38"
thiserror = "2.0"
tracing = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
futures = "0.3"

r2s-config = { version = "3", path = "../config" }

[lib]
path = "src/lib.rs"
