[package]
name = "r2s-database"
version = "3.3.1"
edition = "2021"
rust-version = "1.80.0"
description = "Database for Ret2Shell - A feature-riches CTF challenge platform."
authors = ["Reverier-Xu <reverier.xu@woooo.tech>"]
publish = false
homepage = "https://ret.sh.cn/"
keywords = ["ctf", "challenge", "platform", "security", "education"]
resolver = "2"

[dependencies]
sea-orm = { version = "1.1", features = [
  "sqlx-postgres",
  "runtime-tokio-rustls",
] }
sea-orm-migration = "1.1"
sea-query = "0.32"
serde = { version = "1.0", features = ["derive"] }
serde_repr = "0.1"
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
num-derive = "0.4"
num-traits = "0.2"
tokio = { version = "1.41", features = ["full"] }
tracing = "0.1"

r2s-config = { version = "3", path = "../config" }

[lib]
path = "src/lib.rs"
