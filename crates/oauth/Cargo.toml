[package]
name = "r2s-oauth"
version = "3.3.1"
edition = "2021"
rust-version = "1.80.0"
description = "OAuth/OAuth2 wrapper for Ret2Shell - A feature-riches CTF challenge platform."
authors = ["Reverier-Xu <reverier.xu@woooo.tech>"]
publish = false
homepage = "https://ret.sh.cn/"
keywords = ["ctf", "challenge", "platform", "security", "education"]
resolver = "2"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
thiserror = "2.0"
reqwest = { version = "0.12", features = [
  "json",
  "rustls-tls",
  "http2",
  "charset",
], default-features = false }
roxmltree = "0.20"
tracing = "0.1"

r2s-config = { version = "3", path = "../config" }

[lib]
path = "src/lib.rs"
