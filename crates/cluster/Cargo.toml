[package]
name = "r2s-cluster"
version = "1.0.0"
edition = "2021"
rust-version = "1.77.0"
description = "Cluster manager for Ret2Shell - A feature-riches CTF challenge platform."
authors = ["Reverier-Xu <reverier.xu@woooo.tech>"]
publish = false
homepage = "https://r2s.woooo.tech/"
keywords = ["ctf", "challenge", "platform", "security", "education"]
resolver = "2"

[dependencies]
kube = { version = "0.90", features = [
  "config",
  "client",
  "rustls-tls",
  "runtime",
  "derive",
] }
k8s-openapi = { version = "0.21", features = ["v1_28"] }
tracing = "0.1"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_repr = "0.1"
num-derive = "0.4"
num-traits = "0.2"
chrono = { version = "0.4", features = ["serde"] }
futures-io = "0.3"

r2s-config = { version = "1.0.0", path = "../config" }

[lib]
path = "src/lib.rs"
