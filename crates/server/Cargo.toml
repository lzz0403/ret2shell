[package]
name = "r2s-server"
version = "1.0.0"
edition = "2021"
rust-version = "1.77.2"
description = "Server for Ret2Shell - A feature-riches CTF challenge platform."
authors = ["Reverier-Xu <reverier.xu@woooo.tech>"]
publish = false
homepage = "https://r2s.woooo.tech/"
keywords = ["ctf", "challenge", "platform", "security", "education"]
resolver = "2"

[dependencies]
tokio = { version = "1.37", features = ["full"] }
tokio-util = "0.7"
tokio-stream = "0.1"
futures = "0.3"
axum = { version = "0.7", features = [
  "ws",
  "http2",
  "multipart",
  "macros",
  "tower-log",
  "tracing",
] }
axum-extra = { version = "0.9", features = [
  "typed-header",
  "query",
  "multipart",
  "typed-routing",
  "async-read-body",
] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "fs", "trace"] }
jsonwebtoken = { version = "9.3", default-features = false }
thiserror = "1.0"
clap = { version = "4.5", features = ["derive"] }
colored = "2.1"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = "0.4"
async-nats = "0.34"
argon2 = "0.5"
bcrypt = "0.15"
ring = "0.17"
hex = "0.4"
nanoid = "0.4"
deunicode = "1.4"
sanitizer = "0.1"
once_cell = "1.19"
rand = "0.8"
rustls = { version = "0.23", features = ["ring"] }

# System stat
systemstat = { version = "0.2", features = ["serde"] }
rustc_version = "0.4"
git-version = "0.3"

# Logger
tracing = "0.1"
tracing-core = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"

# local crates
r2s-auditor = { version = "1.0.0", path = "../auditor" }
r2s-bucket = { version = "1.0.0", path = "../bucket" }
r2s-cache = { version = "1.0.0", path = "../cache" }
r2s-captcha = { version = "1.0.0", path = "../captcha" }
r2s-checker = { version = "1.0.0", path = "../checker" }
r2s-cluster = { version = "1.0.0", path = "../cluster" }
r2s-config = { version = "1.0.0", path = "../config" }
r2s-database = { version = "1.0.0", path = "../database" }
r2s-email = { version = "1.0.0", path = "../email" }
r2s-license = { version = "1.0.0", path = "../license" }
r2s-media = { version = "1.0.0", path = "../media" }
r2s-migrator = { version = "1.0.0", path = "../migrator" }
r2s-oauth = { version = "1.0.0", path = "../oauth" }
r2s-queue = { version = "1.0.0", path = "../queue" }
r2s-traffic = { version = "1.0.0", path = "../traffic" }

[lib]
path = "src/lib.rs"

[[bin]]
name = "r2s-server"
path = "src/main.rs"
