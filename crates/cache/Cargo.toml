[package]
name = "r2s-cache"
version = "1.0.0"
edition = "2021"
rust-version = "1.76.0"
description = "Cache database for Ret2Shell - A feature-riches CTF challenge platform."
authors = ["Reverier-Xu <reverier.xu@woooo.tech>"]
publish = false
homepage = "https://r2s.woooo.tech/"
keywords = ["ctf", "challenge", "platform", "security", "education"]
resolver = "2"

[dependencies]
redis = { version = "0.24", features = [
  "tokio-comp",
  "tokio-rustls-comp",
  "cluster-async",
  "connection-manager",
] }
bb8 = "0.8"
bb8-redis = "0.14"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
tracing = "0.1"

[lib]
path = "src/lib.rs"
