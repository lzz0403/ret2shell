[package]
name = "r2s-email"
version = "1.4.2"
edition = "2021"
rust-version = "1.78.0"
description = "Email client for Ret2Shell - A feature-riches CTF challenge platform."
authors = ["Reverier-Xu <reverier.xu@woooo.tech>"]
publish = false
homepage = "https://r2s.woooo.tech/"
keywords = ["ctf", "challenge", "platform", "security", "education"]
resolver = "2"

[dependencies]
r2s-config = { version = "1.0", path = "../config" }

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.38", features = ["full"] }
tracing = "0.1"
lettre = { version = "0.11", features = [
  "smtp-transport",
  "tokio1",
  "rustls-tls",
  "rustls-native-certs",
  "tokio1-rustls-tls",
  "pool",
  "hostname",
  "tracing",
  "builder",
], default-features = false }
thiserror = "1.0"
futures = "0.3"
async-nats = "0.35"

[lib]
path = "src/lib.rs"
