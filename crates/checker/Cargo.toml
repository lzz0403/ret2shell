[package]
name = "r2s-checker"
version = "1.0.0"
edition = "2021"
rust-version = "1.77.2"
description = "Challenge checkers for Ret2Shell - A feature-riches CTF challenge platform."
authors = ["Reverier-Xu <reverier.xu@woooo.tech>"]
publish = false
homepage = "https://r2s.woooo.tech/"
keywords = ["ctf", "challenge", "platform", "security", "education"]
resolver = "2"

[dependencies]
rhai = { version = "1.18", features = ["sync", "metadata"] }
thiserror = "1.0"
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }

r2s-config = { version = "1.0.0", path = "../config" }
r2s-database = { version = "1.0.0", path = "../database" }
r2s-cluster = { version = "1.0.0", path = "../cluster" }
r2s-bucket = { version = "1.0.0", path = "../bucket" }

[lib]
path = "src/lib.rs"
