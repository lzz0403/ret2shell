[package]
name = "r2s-checker"
version = "3.3.1"
edition = "2021"
rust-version = "1.80.0"
description = "Challenge checkers for Ret2Shell - A feature-riches CTF challenge platform."
authors = ["Reverier-Xu <reverier.xu@woooo.tech>"]
publish = false
homepage = "https://ret.sh.cn/"
keywords = ["ctf", "challenge", "platform", "security", "education"]
resolver = "2"

[dependencies]
rune = { version = "0.13", features = ["tokio"] }
rune-modules = { version = "0.13", features = ["full"] }
thiserror = "2.0"
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.41", features = ["full"] }
async-nats = "0.37"
chrono = "0.4"
once_cell = "1.20"
tracing = "0.1"
ret2script = { version = "1.6", default-features = false }

r2s-config = { version = "3", path = "../config" }
r2s-database = { version = "3", path = "../database" }
r2s-cluster = { version = "3", path = "../cluster" }
r2s-bucket = { version = "3", path = "../bucket" }
