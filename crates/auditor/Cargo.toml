[package]
name = "r2s-auditor"
version = "1.0.0"
edition = "2021"
rust-version = "1.77.0"
description = "Auditor for Ret2Shell - A feature-riches CTF challenge platform."
authors = ["Reverier-Xu <reverier.xu@woooo.tech>"]
publish = false
homepage = "https://r2s.woooo.tech/"
keywords = ["ctf", "challenge", "platform", "security", "education"]
resolver = "2"

[dependencies]
aho-corasick = "1.1"
tokio = { version = "1.37", features = ["full"] }
thiserror = "1.0"
tracing = "0.1"
once_cell = "1.19"

r2s-config = { version = "1.0.0", path = "../config" }

[lib]
path = "src/lib.rs"
