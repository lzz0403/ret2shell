services:
  database:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_USER: ret2shell
      POSTGRES_DB: ret2shell
    volumes:
      - database:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  cache:
    image: valkey/valkey:8-alpine
    restart: always
    volumes:
      - cache:/data
    ports:
      - "6379:6379"
  message_queue:
    image: nats:2-alpine
    restart: always
    volumes:
      - message_queue:/data
    ports:
      - "4222:4222"
    command: ["-js", "-sd", "/data"]
  logs:
    image: victoriametrics/victoria-logs:v1.43.1
    restart: always
    ports:
      - "9428:9428"
    command:
      - "--storageDataPath=/vlogs"
    volumes:
      - logs:/vlogs

volumes:
  database:
  cache:
  message_queue:
  logs:
