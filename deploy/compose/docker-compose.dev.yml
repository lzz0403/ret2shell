name: ret2shell-dev

services:
  # database
  database:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_USER: ret2shell
      POSTGRES_DB: ret2shell
    volumes:
      - database:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # cache
  cache:
    image: valkey/valkey:8-alpine
    restart: always
    volumes:
      - cache:/data
    ports:
      - "6379:6379"

  # message queue
  message_queue:
    image: nats:2-alpine
    restart: always
    volumes:
      - message_queue:/data
    ports:
      - "4222:4222"
    command: ["-js", "-sd", "/data"]

  # logs
  vlogs:
    image: victoriametrics/victoria-logs:v1.43.1
    restart: always
    ports:
      - "9428:9428"
    command:
      - "--storageDataPath=/vlogs"
    volumes:
      - vlogs:/vlogs

  # container registry
  registry:
    image: registry:3
    restart: unless-stopped
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
    volumes:
      - registry:/var/lib/registry
    ports:
      - "5000:5000"
    command: ["serve", "/etc/docker/registry/config.yml"]

volumes:
  database:
  cache:
  message_queue:
  vlogs:
  registry:
