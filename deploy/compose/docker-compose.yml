name: ret2shell

services:
  database:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_USER: ret2shell
      POSTGRES_DB: ret2shell
    volumes:
      - database:/var/lib/postgresql/data
    # ports:
    #   - '5432:5432'

  cache:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - cache:/data
    # ports:
    #   - '6379:6379'

  message_queue:
    image: nats:2-alpine
    restart: unless-stopped
    volumes:
      - message_queue:/data
    # ports:
    #   - '4222:4222'
    command: ["-js", "-sd", "/data"]

  registry:
    image: registry:3
    restart: unless-stopped
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
    volumes:
      - registry:/var/lib/registry
    ports:
      - "5000:5000"
    command: ["serve", "/etc/docker/registry/config.yml"]

  platform:
    image: ret2shell:latest
    restart: on-failure:5
    depends_on:
      - database
      - cache
      - message_queue
      - registry # if internal registry is used
    volumes:
      - platform:/var/lib/ret2shell
      - ./config:/etc/ret2shell:ro
      # - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"

  logs:
    image: victoriametrics/victoria-logs:v1.43.1
    ports:
      - "9428:9428"
    command:
      - "--storageDataPath=/vlogs"
    volumes:
      - vldata:/vlogs

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx:ro
      - ./static:/var/www/html:ro
    ports:
      - "80:80"
    depends_on:
      - platform
    # healthcheck:
    #   test: ["CMD", "curl", "-4", "-fs", "http://localhost:80/api/ping"]
    #   start_period: 10s
    #   interval: 5m
    #   timeout: 3s
    #   retries: 1

volumes:
  database:
  cache:
  message_queue:
  registry:
  platform:
  vldata:

networks:
  default:
    driver: bridge
