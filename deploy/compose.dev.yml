services:
  database:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: P@ssw02dInD3v3l0pm3nt
      POSTGRES_USER: ret2shell
      POSTGRES_DB: ret2shell
    volumes:
      - database:/var/lib/postgresql/data
    ports:
      - '5432:5432'
  cache:
    image: valkey/valkey:7-alpine
    restart: always
    volumes:
      - cache:/data
    ports:
      - '6379:6379'
  message_queue:
    image: nats:2-alpine
    restart: always
    volumes:
      - message_queue:/data
    ports:
      - '4222:4222'
    command: ['-js', '-sd', '/data']

volumes:
  database:
  cache:
  message_queue:
