name: Web

on:
  push:
    paths:
      - ".github/workflows/web.yml"
      - "web/**"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/workflows/web.yml"
      - "web/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash -leo pipefail {0}
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          if [ -n '${{ vars.NPM_REGISTRY }}' ]; then
            export NPM_CONFIG_REGISTRY='${{ vars.NPM_REGISTRY }}'
          fi
          pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload artifact
        if: ${{ github.event_name != 'pull_request' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  check:
    name: Check
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash -leo pipefail {0}
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          if [ -n '${{ vars.NPM_REGISTRY }}' ]; then
            export NPM_CONFIG_REGISTRY='${{ vars.NPM_REGISTRY }}'
          fi
          pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm check

      - name: Run tests
        run: pnpm test
