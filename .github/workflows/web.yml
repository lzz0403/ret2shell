name: Web

on:
  push:
    paths:
      - ".github/workflows/web.yml"
      - "web/**"
  pull_request:
    types: [review_requested]

  workflow_dispatch:

jobs:
  web:
    name: Build
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        shell: bash -lieo pipefail {0}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: |
            web/pnpm-lock.yaml
            web/package-lock.json
            web/yarn.lock

      - name: Install dependencies
        run: |
          pnpm config set --global registry '${{ vars.NPM_REGISTRY }}'
          pnpm --prefix web install

      - name: Build
        run: pnpm --prefix web build

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  check:
    name: Check
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        shell: bash -lieo pipefail {0}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: |
            web/pnpm-lock.yaml
            web/package-lock.json
            web/yarn.lock

      - name: Install dependencies
        run: |
          pnpm config set --global registry '${{ vars.NPM_REGISTRY }}'
          pnpm --prefix web install

      - name: Lint
        run: pnpm --prefix web format && pnpm --prefix web lint