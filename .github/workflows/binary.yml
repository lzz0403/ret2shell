name: Binary

on:
  push:
    paths:
      - ".github/workflows/binary.yml"
      - ".github/setup-env.sh"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rustfmt.toml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/workflows/binary.yml"
      - ".github/setup-env.sh"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rustfmt.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: binary-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt-check:
    name: Format
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Setup nightly rustfmt
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Rust format check
        run: cargo +nightly fmt --all -- --check

  check:
    name: Test and Clippy
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Install linker toolchain
        run: |
          if ! command -v clang >/dev/null 2>&1 || ! command -v ld.lld >/dev/null 2>&1; then
            sudo apt update
            sudo apt install -y clang lld
          fi

      - name: Setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
          key: cargo-${{ runner.os }}-stable-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-stable-
            cargo-${{ runner.os }}-

      - name: Cache target
        uses: actions/cache@v5
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-stable-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-stable-
            cargo-target-${{ runner.os }}-

      - name: Run tests
        run: cargo test --locked --workspace --all-features

      - name: Cargo clippy checks
        run: cargo clippy --locked --workspace --all-features --all-targets -- -D warnings

  binary:
    name: Build
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl]
    env:
      R2S_GIT_VERSION: unknown
      commit_sha: unknown
      app_v: unknown

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: chetan/git-restore-mtime-action@v2

      - name: Setup environment
        id: setup-env
        run: |
          if ! command -v musl-gcc >/dev/null 2>&1 || ! command -v clang >/dev/null 2>&1 || ! command -v ld.lld >/dev/null 2>&1; then
            sudo apt update
            sudo apt install -y musl-tools musl-dev clang lld
          fi
          bash .github/setup-env.sh

      - name: Setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.target }}-
            cargo-${{ runner.os }}-

      - name: Cache build target
        uses: actions/cache@v5
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-${{ matrix.target }}-
            cargo-target-${{ runner.os }}-

      - name: Build on version ${{ env.app_v }}-${{ env.commit_sha }}
        run: cargo build --locked --bin r2s-server --release --target '${{ matrix.target }}'

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: r2s-server
          path: target/${{ matrix.target }}/release/r2s-server
          retention-days: 1
