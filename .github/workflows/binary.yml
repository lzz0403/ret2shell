name: Binary

on:
  push:
    paths:
      - ".github/workflows/binary.yml"
      - ".github/setup-env.sh"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"

  workflow_dispatch:

jobs:
  binary:
    name: Build
    runs-on: [self-hosted, linux, x64]
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl]
    env:
      R2S_GIT_VERSION: unknown
      # These environment variables will be set by `setup-env.sh`
      commit_sha: unknown
      app_v: unknown

    steps:
      - uses: actions/checkout@v4
        with:
          # fetch depth 0 to fetch all history for git-restore-mtime-action
          fetch-depth: 0

      - uses: chetan/git-restore-mtime-action@v2

      - name: Setup environment
        id: setup-env
        run: |
          sudo apt update && sudo apt install -y musl-tools musl-dev clang lld
          bash .github/setup-env.sh

      - name: Setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-${{ runner.os }}-${{ steps.setup-env.outputs.cache_v }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache target
        uses: actions/cache@v4
        with:
          path: target/
          key: rustc-${{ runner.os }}-${{ matrix.target }}-${{ steps.setup-env.outputs.cache_v }}
          restore-keys: |
            rustc-${{ runner.os }}-${{ matrix.target }}-
            rustc-${{ runner.os }}-

      - name: Build on version ${{ env.app_v }}-${{ env.commit_sha }}
        run: |
          base64 -d <<< '${{ vars.PUBKEY_BASE64 }}' > config/pub.bin
          cargo build --bin r2s-server --release --target '${{ matrix.target }}'

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: r2s-server
          path: target/${{ matrix.target }}/release/r2s-server
          retention-days: 1

  clippy-check:
    name: Check
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: [self-hosted, linux, x64]
    steps:
    - uses: actions/checkout@v4

    - name: Setup rust
      uses: dtolnay/rust-toolchain@stable

    - name: Setup clippy
      id: setup-clippy
      run: rustup component add clippy

    - name: Cargo clippy checks
      run: |
        base64 -d <<< '${{ vars.PUBKEY_BASE64 }}' > config/pub.bin
        cargo clippy --all-features --all-targets -- -D warnings
